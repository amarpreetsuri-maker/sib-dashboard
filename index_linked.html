<style>

body{font-family:system-ui,sans-serif;background:#f0f4f0;color:#1a2e1a}
.db{padding:16px}

.load-text{font-size:13px;color:#5a7a5a;text-align:center}
.error-box{background:#fff3f3;border:1.5px solid #f0c8c8;border-radius:12px;padding:24px;margin:0;text-align:center;color:#a03030;font-size:13px;line-height:1.8}

.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.kpi{background:#fff;border-radius:12px;border:1.5px solid #c8dcc8;padding:16px 20px;cursor:pointer;transition:box-shadow .15s}

.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#5a7a5a;margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:700;color:#0d5c2e;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:#7a9a7a;margin-top:3px}
.filters{background:#fff;border-radius:12px;border:1.5px solid #c8dcc8;padding:14px 18px;margin-bottom:14px}
.f-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#5a7a5a;margin-bottom:0}
.f-row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;margin-top:10px}
.f-group{display:flex;flex-direction:column;gap:5px}
.f-label{font-size:10px;color:#7a9a7a;font-weight:600;letter-spacing:.05em}
.btn-group{display:flex;gap:4px;flex-wrap:wrap}
.btn{padding:5px 13px;border-radius:20px;border:1.5px solid #c8dcc8;background:#f8fbf8;font-size:12px;cursor:pointer;color:#2a4a2a;transition:all .15s;font-family:inherit}
.btn:hover{background:#e8f4e8}
.btn.active{background:#0d5c2e;color:#fff;border-color:#0d5c2e}
select{padding:5px 10px;border-radius:8px;border:1.5px solid #c8dcc8;font-size:12px;background:#f8fbf8;color:#2a4a2a;cursor:pointer;outline:none;font-family:inherit;min-width:140px}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:10px;border:1.5px solid #c8dcc8;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#2a4a2a;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit}

.panel{background:#fff;border-radius:12px;border:1.5px solid #c8dcc8;padding:18px 20px;min-height:200px}
.legend{display:flex;gap:16px;margin-bottom:12px;font-size:11px;color:#5a7a5a;flex-wrap:wrap}
.leg-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.no-data{text-align:center;padding:40px;color:#7a9a7a;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;border-bottom:2px solid #e0ece0;color:#5a7a5a;font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
td{padding:7px 10px;border-bottom:1px solid #f0f4f0;color:#2a4a2a}
tr:hover td{background:#f8fbf8}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.bn{background:#e8f4ee;color:#0d5c2e}.br{background:#e8f0f4;color:#1a4a6e}
.ba{background:#e8f4ee;color:#0d5c2e}.bb{background:#e8f0f4;color:#1a4a6e}
.bc{background:#fef8e8;color:#7a5a0a}.bd{background:#f4f4f4;color:#5a5a5a}

.flow-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #e8f0e8;font-size:12px;color:#2a4a2a;cursor:pointer}

function handleRefresh(){
  const btn=document.getElementById('refreshBtn');
  if(!btn||btn.disabled)return;
  btn.disabled=true;
  btn.classList.add('spinning');
  btn.querySelector('.rb-label').textContent='Refreshing…';
  setTimeout(()=>{
    btn.disabled=false;
    btn.classList.remove('spinning');
    btn.querySelector('.rb-label').textContent='Refresh';
    document.getElementById('lastUpdated').textContent='✓ Up to date · Just now';
  }, 1200);
}

async function loadData(){
  document.querySelectorAll('.warn-banner').forEach(e=>e.remove());

  // Always show dashboard INSTANTLY with cached data — zero spinner wait
  D = FALLBACK;
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('lastUpdated').textContent='⚠ Cached data (Mar 2026)';
  rebuildFilters();
  render();
  sendHeight();

  // Fetch pre-parsed data.json (generated by GitHub Actions every 30 min)
  try{
    const resp = await fetch('./data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    D = json.records;
    const updated = new Date(json.updated);
    document.getElementById('lastUpdated').textContent='Last updated ' + updated.toLocaleString([],{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) + ' · Auto-updates every 15 min';
    document.querySelectorAll('.warn-banner').forEach(e=>e.remove());
    rebuildFilters();
    render();
  }catch(e){
    // Live fetch failed — keep cached data, show small warning
    document.getElementById('lastUpdated').textContent='⚠ Cached data (Mar 2026)';
    const warn=document.createElement('div');
    warn.className='warn-banner';
    warn.style.cssText='background:#fff8e8;border:1.5px solid #e8d88a;border-radius:10px;padding:8px 16px;margin-bottom:12px;font-size:11px;color:#7a5a0a;display:flex;justify-content:space-between;align-items:center;gap:12px';
    warn.innerHTML=`<span>⚠ Showing cached data — live update failed. <small style="opacity:.6">${e.message}</small></span>
      <button onclick="loadData()" style="padding:4px 12px;background:#b87214;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit">↻ Retry</button>`;
    document.getElementById('app').insertBefore(warn,document.getElementById('app').firstChild);
  }
  sendHeight();
}


async function tryFetch(url){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),8000);
  try{
    const r=await fetch(url,{credentials:'include',headers:{Accept:'application/octet-stream'},signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const buf=await r.arrayBuffer();
    if(buf.byteLength<500) throw new Error('Too small');
    return buf;
  }catch(e){ clearTimeout(t); throw e; }
}

function filtered(){
  const maxW=D.length?Math.max(...D.map(r=>r.w)):0;
  return D.filter(r=>{
    if(state.month!=='All'){
      if(r.m!==state.month)return false;
    } else if(state.time!=='All'){
      const nw=parseInt(state.time);if(r.w<maxW-nw+1)return false;
    }
    if(state.pt!=='All'&&r.pt!==state.pt)return false;
    if(state.broker!=='All'&&r.b!==state.broker)return false;
    if(state.deal!=='All'&&r.prod!==state.deal)return false;
    return true;
  });
}

function rebuildFilters(){
  ['timeFilters','ptFilters','monthFilters','brokerSel','dealSel','tabs'].forEach(id=>document.getElementById(id).innerHTML='');
  const tEl=document.getElementById('timeFilters');
  ['1W','2W','4W','8W','All'].forEach(lbl=>{
    const b=document.createElement('button');
    b.className='btn'+(state.time===lbl&&state.month==='All'?' active':''); b.textContent=lbl;
    b.onclick=()=>{state.time=lbl;state.month='All';rebuildFilters();render();}; tEl.appendChild(b);
  });

  // Month filter buttons — derive unique months from data in calendar order
  const monthOrder=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const availMonths=['All',...monthOrder.filter(m=>D.some(r=>r.m===m))];
  const mEl=document.getElementById('monthFilters');
  availMonths.forEach(m=>{
    const b=document.createElement('button');
    b.className='btn'+(state.month===m?' active':''); b.textContent=m==='All'?'All':m;
    b.onclick=()=>{
      state.month=m;
      if(m!=='All') state.time='All';
      rebuildFilters();render();
    }; mEl.appendChild(b);
  });
  const ptEl=document.getElementById('ptFilters');
  [{l:'All',v:'All'},{l:'New Business',v:'New'},{l:'Renewal',v:'Renewal'}].forEach(({l,v})=>{
    const b=document.createElement('button');
    b.className='btn'+(state.pt===v?' active':''); b.textContent=l;
    b.onclick=()=>{state.pt=v;render();}; ptEl.appendChild(b);
  });
  const bSel=document.getElementById('brokerSel');
  ['All',...Array.from(new Set(D.map(r=>r.b))).sort()].forEach(x=>{
    const o=document.createElement('option'); o.value=x; o.textContent=x==='All'?'All Brokers':x;
    if(x===state.broker)o.selected=true; bSel.appendChild(o);
  });
  bSel.onchange=()=>{state.broker=bSel.value;render();window.top.location.href=SP_PAGE;};
  const dSel=document.getElementById('dealSel');
  ['All',...Array.from(new Set(D.map(r=>r.prod))).sort()].forEach(x=>{
    const o=document.createElement('option'); o.value=x; o.textContent=x==='All'?'All Deal Types':x;
    if(x===state.deal)o.selected=true; dSel.appendChild(o);
  });
  dSel.onchange=()=>{state.deal=dSel.value;render();window.top.location.href=SP_PAGE;};
  const tabEl=document.getElementById('tabs');
  [{id:'broker',icon:'📊',lbl:'By Broker'},{id:'trend',icon:'📈',lbl:'Trend'},{id:'flow',icon:'🔀',lbl:'Flow Chart'},{id:'table',icon:'🗂',lbl:'Deal Table'}].forEach(t=>{
    const b=document.createElement('button');
    b.className='tab'+(state.tab===t.id?' active':''); b.innerHTML=t.icon+' '+t.lbl;
    b.onclick=()=>{
      if(t.id==='table'&&state.tab!=='table'){
        state._prevTime=state.time; state._prevMonth=state.month;
        state.time='All'; state.month='All';
        rebuildFilters();
      }
      if(t.id!=='table'&&state.tab==='table'){
        state.time=state._prevTime||'1W'; state.month=state._prevMonth||'All';
        rebuildFilters();
      }
      state.tab=t.id; render();
    }; tabEl.appendChild(b);
  });
}

function render(){
  document.querySelectorAll('#timeFilters .btn').forEach(b=>b.classList.toggle('active',b.textContent===state.time&&state.month==='All'));
  document.querySelectorAll('#monthFilters .btn').forEach(b=>{
    const m=b.textContent;
    b.classList.toggle('active',(m==='All'&&state.month==='All')||(m===state.month));
  });
  document.querySelectorAll('#ptFilters .btn').forEach(b=>{
    const v=b.textContent==='All'?'All':b.textContent==='New Business'?'New':'Renewal';
    b.classList.toggle('active',v===state.pt);
  });
  document.querySelectorAll('.tab').forEach(b=>{
    const id=b.innerHTML.includes('Broker')?'broker':b.innerHTML.includes('Trend')?'trend':b.innerHTML.includes('Flow')?'flow':'table';
    b.classList.toggle('active',id===state.tab);
  });
  const d=filtered();
  const total=d.reduce((s,r)=>s+r.u,0);
  const newT=d.filter(r=>r.pt==='New').reduce((s,r)=>s+r.u,0);
  const renT=d.filter(r=>r.pt==='Renewal').reduce((s,r)=>s+r.u,0);
  document.getElementById('k1').textContent=fmt(total);
  document.getElementById('k1s').textContent=d.length+' policies';
  document.getElementById('k2').textContent=fmt(newT);
  document.getElementById('k2s').textContent=d.filter(r=>r.pt==='New').length+' policies';
  document.getElementById('k3').textContent=fmt(renT);
  document.getElementById('k3s').textContent=d.filter(r=>r.pt==='Renewal').length+' policies';
  if(chartInst){chartInst.destroy();chartInst=null;}
  const panel=document.getElementById('panel');
  if(state.tab==='broker') renderBroker(d,panel);
  else if(state.tab==='trend') renderTrend(d,panel);
  else if(state.tab==='flow') renderFlow(d,panel);
  else renderTable(D,panel);
  sendHeight();
}

function renderBroker(d,panel){
  const dm={};
  d.forEach(r=>{
    if(!dm[r.div])dm[r.div]={n:0,r:0,b:{}};
    dm[r.div][r.pt==='New'?'n':'r']+=r.u;
    if(!dm[r.div].b[r.b])dm[r.div].b[r.b]={n:0,r:0};
    dm[r.div].b[r.b][r.pt==='New'?'n':'r']+=r.u;
  });
  const divs=Object.entries(dm).map(([k,v])=>({name:k,n:v.n,r:v.r,t:v.n+v.r,b:v.b})).sort((a,b)=>b.t-a.t).filter(d=>d.t>0);
  const maxV=divs[0]?.t||1;
  if(!divs.length){panel.innerHTML='<div class="no-data">No data</div>';return;}
  panel.innerHTML=`<div class="legend"><span><span class="leg-dot" style="background:#0d5c2e"></span>New Business</span><span><span class="leg-dot" style="background:#4CAF80"></span>Renewal Business</span></div><div id="brokerTree"></div>`;
  const tree=document.getElementById('brokerTree');
  const col={};
  divs.forEach(d=>{col[d.name]=false;});
  function rt(){
    tree.innerHTML=divs.map(div=>{
      const closed=col[div.name]!==false;
      const brows=Object.entries(div.b).map(([b,v])=>({name:b,n:v.n,r:v.r,t:v.n+v.r})).sort((a,b)=>b.t-a.t).filter(b=>b.t>0);
      const hc=brows.length>1||(brows.length===1&&brows[0].name!==div.name);
      const icon=hc?(closed?'⊕':'⊖'):'';
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;cursor:pointer;border-radius:6px;padding:3px 4px;background:${closed?'':'#f8fdf8'}" onclick="window.__td('${div.name.replace(/'/g,"\\'")}')">
        <span style="width:14px;font-size:13px;color:#0d5c2e;flex-shrink:0;text-align:center">${icon}</span>
        <span style="width:116px;font-size:12px;font-weight:600;text-align:right;color:#1a2e1a;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${div.name}</span>
        <div style="flex:1;height:26px;background:#f0f4f0;border-radius:6px;overflow:hidden;display:flex">
          <div style="background:#0d5c2e;height:100%;width:${(div.n/maxV*100).toFixed(1)}%;min-width:0"></div>
          <div style="background:#4CAF80;height:100%;width:${(div.r/maxV*100).toFixed(1)}%;min-width:0"></div>
        </div>
        <span style="font-size:12px;font-weight:600;color:#0d5c2e;width:100px;flex-shrink:0">${fmt(div.t)}</span>
      </div>
      ${!closed&&hc?brows.map(b=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;padding:2px 4px;border-radius:6px" onmouseover="this.style.background='#f0f8f0'" onmouseout="this.style.background=''" onclick="window.top.location.href=SP_PAGE">
          <span style="width:14px;flex-shrink:0"></span>
          <span style="width:116px;font-size:11px;text-align:right;color:#5a7a5a;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:4px">${b.name}</span>
          <div style="flex:1;height:18px;background:#f0f4f0;border-radius:4px;overflow:hidden;display:flex">
            <div style="background:#0d5c2e;height:100%;width:${(b.n/maxV*100).toFixed(1)}%;min-width:0;opacity:.8"></div>
            <div style="background:#4CAF80;height:100%;width:${(b.r/maxV*100).toFixed(1)}%;min-width:0;opacity:.8"></div>
          </div>
          <span style="font-size:11px;font-weight:500;color:#5a7a5a;width:100px;flex-shrink:0">${fmt(b.t)}</span>
        </div>`).join(''):''}`;
    }).join('');
  }
  window.__td=name=>{col[name]=col[name]===false?true:false;rt();sendHeight();};
  rt();
}

function renderTrend(d,panel){
  const monthOrder=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const isWeek=state.trendView==='week';
  const toggleHtml=`<div style="display:flex;gap:5px;margin-bottom:12px;align-items:center">
    <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#5a7a5a;margin-right:4px">View:</span>
    <button onclick="window.__tv('week')" style="padding:4px 12px;border-radius:20px;border:1.5px solid #c8dcc8;font-size:11px;cursor:pointer;font-family:inherit;background:${isWeek?'#0d5c2e':'#f8fbf8'};color:${isWeek?'#fff':'#2a4a2a'}">📅 Week</button>
    <button onclick="window.__tv('month')" style="padding:4px 12px;border-radius:20px;border:1.5px solid #c8dcc8;font-size:11px;cursor:pointer;font-family:inherit;background:${!isWeek?'#0d5c2e':'#f8fbf8'};color:${!isWeek?'#fff':'#2a4a2a'}">📆 Month</button>
  </div>`;
  let labels, newData, renData;
  if(isWeek){
    const wks=[...new Set(d.map(r=>r.w))].sort((a,b)=>a-b);
    if(!wks.length){panel.innerHTML='<div class="no-data">No data</div>';return;}
    labels=wks.map(w=>'Wk '+w);
    newData=wks.map(w=>d.filter(r=>r.w===w&&r.pt==='New').reduce((s,r)=>s+r.u,0));
    renData=wks.map(w=>d.filter(r=>r.w===w&&r.pt==='Renewal').reduce((s,r)=>s+r.u,0));
  } else {
    const months=[...new Set(d.map(r=>r.m))].sort((a,b)=>monthOrder.indexOf(a)-monthOrder.indexOf(b));
    if(!months.length){panel.innerHTML='<div class="no-data">No data</div>';return;}
    labels=months;
    newData=months.map(m=>d.filter(r=>r.m===m&&r.pt==='New').reduce((s,r)=>s+r.u,0));
    renData=months.map(m=>d.filter(r=>r.m===m&&r.pt==='Renewal').reduce((s,r)=>s+r.u,0));
  }
  panel.innerHTML=`${toggleHtml}<div class="legend"><span><span class="leg-dot" style="background:#0d5c2e"></span>New Business</span><span><span class="leg-dot" style="background:#4CAF80"></span>Renewal Business</span></div><div style="position:relative;width:100%;height:240px"><canvas id="tc"></canvas></div>`;
  window.__tv=v=>{state.trendView=v;render();};
  setTimeout(()=>{
    const ctx=document.getElementById('tc');if(!ctx)return;
    chartInst=new Chart(ctx,{type:'bar',data:{labels,datasets:[
      {label:'New Business',data:newData,backgroundColor:'#0d5c2e',borderRadius:4,stack:'s'},
      {label:'Renewal Business',data:renData,backgroundColor:'#4CAF80',borderRadius:4,stack:'s'}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.parsed.y)}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:11},color:'#5a7a5a'}},y:{stacked:true,grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:10},color:'#5a7a5a',callback:v=>fmt(v)}}}}});
  },50);
}

function renderFlow(d,panel){
  const pm={},tm={A:0,B:0,C:0,D:0},prm={};
  d.forEach(r=>{pm[r.prod]=(pm[r.prod]||0)+r.u;if(tm[r.t]!==undefined)tm[r.t]+=r.u;prm[r.prov]=(prm[r.prov]||0)+r.u;});
  const tp=Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const tv=Object.entries(prm).sort((a,b)=>b[1]-a[1]).slice(0,5);
  panel.innerHTML=`<div class="flow-grid">
    <div class="flow-card"><div class="flow-title">Product Mix</div>${tp.map(([k,v])=>`<div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span>${k}</span><span class="flow-val">${fmt(v)}</span></div>`).join('')}</div>
    <div class="flow-card"><div class="flow-title">Top Providers</div>${tv.map(([k,v])=>`<div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span>${k}</span><span class="flow-val">${fmt(v)}</span></div>`).join('')}</div>
    <div class="flow-card"><div class="flow-title">Client Tiers</div>
      <div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span><span class="badge ba">A</span> Premium</span><span class="flow-val">${fmt(tm.A)}</span></div>
      <div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span><span class="badge bb">B</span> High</span><span class="flow-val">${fmt(tm.B)}</span></div>
      <div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span><span class="badge bc">C</span> Mid</span><span class="flow-val">${fmt(tm.C)}</span></div>
      <div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span><span class="badge bd">D</span> Standard</span><span class="flow-val">${fmt(tm.D)}</span></div>
    </div>
    <div class="flow-card"><div class="flow-title">Summary</div>
      <div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span>New Business</span><span class="flow-val">${d.filter(r=>r.pt==='New').length} deals</span></div>
      <div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span>Renewal Business</span><span class="flow-val">${d.filter(r=>r.pt==='Renewal').length} deals</span></div>
      <div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span>Total Deals</span><span class="flow-val">${d.length}</span></div>
      <div class="flow-row" style="cursor:pointer" onclick="window.top.location.href=SP_PAGE"><span>Unique Brokers</span><span class="flow-val">${new Set(d.map(r=>r.b)).size}</span></div>
    </div>
  </div>`;
}

function renderTable(d,panel){
  const tf=state.tblFilter, ts=state.tblSort;
  const monthOrder=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const uniq=(arr)=>['All',...Array.from(new Set(arr)).sort()];
  const brokers=uniq(d.map(r=>r.b));
  const divisions=uniq(d.map(r=>r.div));
  const types=['All','New','Renewal'];
  const products=uniq(d.map(r=>r.prod));
  const providers=uniq(d.map(r=>r.prov));
  const tiers=['All','A','B','C','D'];
  const months=['All',...monthOrder.filter(m=>d.some(r=>r.m===m))];
  const weeks=['All',...Array.from(new Set(d.map(r=>r.w))).sort((a,b)=>a-b).map(String)];

  let rows=d.filter(r=>{
    if(tf.broker!=='All'&&r.b!==tf.broker)return false;
    if(tf.division!=='All'&&r.div!==tf.division)return false;
    if(tf.type!=='All'&&r.pt!==tf.type)return false;
    if(tf.product!=='All'&&r.prod!==tf.product)return false;
    if(tf.provider!=='All'&&r.prov!==tf.provider)return false;
    if(tf.tier!=='All'&&r.t!==tf.tier)return false;
    if(tf.month!=='All'&&r.m!==tf.month)return false;
    if(tf.week!=='All'&&String(r.w)!==tf.week)return false;
    return true;
  });

  const colKey={broker:'b',division:'div',type:'pt',product:'prod',provider:'prov',tier:'t',u:'u',month:'m',week:'w'};
  rows=[...rows].sort((a,b)=>{
    let av=a[colKey[ts.col]||ts.col], bv=b[colKey[ts.col]||ts.col];
    if(ts.col==='month'){av=monthOrder.indexOf(av);bv=monthOrder.indexOf(bv);}
    if(typeof av==='number'&&typeof bv==='number')return ts.dir==='asc'?av-bv:bv-av;
    return ts.dir==='asc'?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
  });

  const total=rows.reduce((s,r)=>s+r.u,0);
  const newTotal=rows.filter(r=>r.pt==='New').reduce((s,r)=>s+r.u,0);
  const renTotal=rows.filter(r=>r.pt==='Renewal').reduce((s,r)=>s+r.u,0);

  function selHtml(key,opts,val){
    return `<select onchange="state.tblFilter['${key}']=this.value;render()" style="padding:3px 6px;border-radius:6px;border:1.5px solid #c8dcc8;font-size:10px;background:#f8fbf8;color:#2a4a2a;cursor:pointer;outline:none;font-family:inherit;max-width:110px">${opts.map(o=>`<option value="${o}"${val===o?' selected':''}>${o==='All'?'All':o}</option>`).join('')}</select>`;
  }

  function thSort(label,col){
    const active=ts.col===col;
    const arrow=active?(ts.dir==='asc'?'↑':'↓'):'↕';
    const color=active?'#0d5c2e':'#9ab09a';
    return `<th style="cursor:pointer;white-space:nowrap;user-select:none" onclick="state.tblSort={col:'${col}',dir:(state.tblSort.col==='${col}'&&state.tblSort.dir==='desc')?'asc':'desc'};render()">${label} <span style="color:${color};font-size:10px">${arrow}</span></th>`;
  }

  // Active filter count badge
  const activeFilters=Object.values(tf).filter(v=>v!=='All').length;
  const resetBtn=activeFilters>0?`<button onclick="state.tblFilter={broker:'All',division:'All',type:'All',product:'All',provider:'All',tier:'All',month:'All',week:'All'};render()" style="padding:3px 10px;border-radius:6px;border:1.5px solid #f0c8c8;background:#fff3f3;font-size:10px;cursor:pointer;color:#a03030;font-family:inherit">✕ Clear filters (${activeFilters})</button>`:'';

  panel.innerHTML=`
  <div style="display:flex;justify-content:flex-end;margin-bottom:6px;min-height:22px">${resetBtn}</div>
  <div style="overflow-x:auto">
  <table>
    <thead>
      <tr>
        ${thSort('Broker','broker')}
        ${thSort('Division','division')}
        ${thSort('Type','type')}
        ${thSort('Product','product')}
        ${thSort('Provider','provider')}
        ${thSort('Tier','tier')}
        ${thSort('Commission','u')}
        ${thSort('Month','month')}
        ${thSort('Week','week')}
      </tr>
      <tr style="background:#f4f9f4">
        <td style="padding:4px 6px">${selHtml('broker',brokers,tf.broker)}</td>
        <td style="padding:4px 6px">${selHtml('division',divisions,tf.division)}</td>
        <td style="padding:4px 6px">${selHtml('type',types,tf.type)}</td>
        <td style="padding:4px 6px">${selHtml('product',products,tf.product)}</td>
        <td style="padding:4px 6px">${selHtml('provider',providers,tf.provider)}</td>
        <td style="padding:4px 6px">${selHtml('tier',tiers,tf.tier)}</td>
        <td></td>
        <td style="padding:4px 6px">${selHtml('month',months,tf.month)}</td>
        <td style="padding:4px 6px">${selHtml('week',weeks,tf.week)}</td>
      </tr>
    </thead>
    <tbody>
      ${rows.map(r=>`<tr>
        <td>${r.b}</td>
        <td style="color:#5a7a5a;font-size:11px">${r.div}</td>
        <td><span class="badge ${r.pt==='New'?'bn':'br'}">${r.pt}</span></td>
        <td style="font-size:11px;color:#5a7a5a">${r.prod}</td>
        <td style="font-size:11px">${r.prov}</td>
        <td><span class="badge b${r.t.toLowerCase()}">${r.t}</span></td>
        <td style="font-weight:600;color:#0d5c2e">${fmt(r.u)}</td>
        <td style="font-size:11px;color:#5a7a5a">${r.m}</td>
        <td style="font-size:11px;color:#5a7a5a">Wk ${r.w}</td>
      </tr>`).join('')}
    </tbody>
    <tfoot>
      <tr style="background:#f0f7f0;border-top:2px solid #c8dcc8">
        <td colspan="2" style="padding:8px 10px;font-size:11px;font-weight:700;color:#5a7a5a">${rows.length} deal${rows.length!==1?'s':''}</td>
        <td colspan="2" style="padding:8px 10px;font-size:11px;color:#5a7a5a">New: <span style="color:#0d5c2e;font-weight:600">${fmt(newTotal)}</span></td>
        <td colspan="2" style="padding:8px 10px;font-size:11px;color:#5a7a5a">Renewal: <span style="color:#1a4e6e;font-weight:600">${fmt(renTotal)}</span></td>
        <td style="padding:8px 10px;font-weight:700;color:#0d5c2e;font-size:13px">${fmt(total)}</td>
        <td colspan="2" style="padding:8px 10px;font-size:10px;color:#9ab09a;text-align:right">Total</td>
      </tr>
    </tfoot>
  </table>
  </div>`;
}

  loadData();

</script>
